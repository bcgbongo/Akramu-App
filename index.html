<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png">
    <title>Akramu App</title>

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .app-icon {
            max-width: 180px;
            margin-bottom: 20px;
            border-radius: 50%;
        }

        .screenshot {
            max-width: 100%;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        /* BIG DOWNLOAD BUTTON */
        .big-download-btn {
            display: inline-block;
            width: 100%;
            font-size: 26px;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            border: none;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: 0.3s ease;
        }

        .big-download-btn:hover {
            transform: scale(1.05);
            text-decoration: none;
            color: white;
        }

    </style>
</head>

<body>

<div class="container text-center mt-5">

    <!-- App Icon -->
    <img src="icon.png" alt="Akramu App" class="app-icon">

    <!-- Title -->
    <h1 class="font-weight-bold">Akramu App</h1>
    <p class="lead">Furahia Mpira, Tamthilia, Magazeti na Tetesi za Soka</p>

    <div class="row mt-4">

        <!-- Download Section -->
        <div class="col-md-4 mb-4">
            <h3 class="mb-3">Download the App</h3>

            <a href="https://play.google.com/store/apps/details?id=com.burudanitv.app" 
               class="big-download-btn">
               <i class="bi bi-google-play"></i> Download Now
            </a>
        </div>

        <!-- Screenshots -->
        <div class="col-md-8">
            <h3 class="mb-3">Screenshots</h3>
            <div class="row">
                <div class="col-md-4">
                    <img src="a3.jpeg" alt="Screenshot 1" class="screenshot">
                </div>
                <div class="col-md-4">
                    <img src="a2.jpeg" alt="Screenshot 2" class="screenshot">
                </div>
                <div class="col-md-4">
                    <img src="a1.jpeg" alt="Screenshot 3" class="screenshot">
                </div>
            </div>
        </div>

    </div>
</div>


<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
